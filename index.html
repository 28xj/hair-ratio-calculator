<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="theme-color" content="#111111">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#111111; --bg2:#1a1a1a; --bg3:#222222; --card:#2a2a2a;
    --border:#3a3a3a; --border2:#444444;
    --white:#ffffff; --gray1:#cccccc; --gray2:#888888; --gray3:#555555;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); font-family:'Noto Sans TC',sans-serif; color:var(--white); }
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; }

  /* HOME */
  #home { background:var(--bg); align-items:center; justify-content:center; padding:40px 24px; }
  .home-top { text-align:center; margin-bottom:48px; }
  .logo-img { width:92px; height:auto; margin:0 auto 24px; display:block; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; cursor:pointer; }
  .salon-name { font-size:12px; font-weight:500; letter-spacing:0.18em; color:var(--gray1); margin-bottom:18px; }
  .salon-name .sub { font-weight:300; color:var(--gray3); }
  .home-title { font-family:'Noto Serif TC',serif; font-size:21px; font-weight:400; letter-spacing:0.32em; color:var(--white); line-height:1.4; padding-left:0.32em; }
  .home-rule { width:28px; height:1px; background:var(--border2); margin:18px auto 0; }
  .menu-grid { width:100%; max-width:360px; display:flex; flex-direction:column; gap:10px; }
  .menu-btn { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; background:var(--card); border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:background .2s,border-color .2s; }
  .menu-btn:hover,.menu-btn:active { background:var(--bg3); border-color:var(--border2); }
  .menu-btn-label { display:flex; flex-direction:column; gap:4px; text-align:left; }
  .menu-btn-en { font-size:9px; letter-spacing:0.3em; color:var(--gray2); text-transform:uppercase; }
  .menu-btn-zh { font-family:'Noto Serif TC',serif; font-size:16px; font-weight:400; color:var(--white); letter-spacing:0.08em; }
  .menu-arrow { width:18px; height:18px; border-right:1.5px solid var(--gray3); border-top:1.5px solid var(--gray3); transform:rotate(45deg); flex-shrink:0; }
  .menu-divider { width:100%; max-width:360px; height:1px; background:var(--border); margin:6px 0; }
  .records-link { display:flex; align-items:center; gap:10px; padding:14px 0; cursor:pointer; color:var(--gray2); font-size:12px; letter-spacing:0.15em; font-weight:300; background:none; border:none; font-family:'Noto Sans TC',sans-serif; }
  .edit-badge { position:fixed; top:14px; right:14px; font-size:9px; letter-spacing:0.2em; color:#111; background:var(--white); padding:4px 10px; border-radius:3px; display:none; z-index:50; cursor:pointer; }
  .edit-badge.show { display:block; }
  .help-btn { flex-shrink:0; padding:7px 12px; border:1px solid var(--border2); border-radius:16px; background:none; color:var(--gray1); font-size:11px; letter-spacing:0.1em; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
  #tour-mask { display:none; position:fixed; inset:0; z-index:600; }
  #tour-mask.open { display:block; }
  .tour-spot { position:absolute; border:2px solid var(--white); border-radius:6px; box-shadow:0 0 0 9999px rgba(0,0,0,0.78); transition:all .25s; pointer-events:none; }
  .tour-pop { position:absolute; max-width:300px; background:var(--white); color:#111; border-radius:8px; padding:16px 18px; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
  .tour-pop-title { font-size:14px; font-weight:600; letter-spacing:0.05em; margin-bottom:6px; }
  .tour-pop-text { font-size:12.5px; line-height:1.75; color:#444; margin-bottom:14px; }
  .tour-pop-foot { display:flex; align-items:center; justify-content:space-between; }
  .tour-step { font-size:11px; color:#999; letter-spacing:0.1em; }
  .tour-next { padding:8px 18px; background:#111; color:#fff; border:none; border-radius:5px; font-size:13px; letter-spacing:0.1em; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

  /* HEADERS */
  .form-header,.records-header { background:var(--bg); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:10; }
  .back-btn { width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:none; border:none; padding:0; }
  .form-header-text { flex:1; }
  .form-header-en { font-size:9px; letter-spacing:0.28em; color:var(--gray2); text-transform:uppercase; }
  .form-header-zh { font-family:'Noto Serif TC',serif; font-size:15px; font-weight:400; color:var(--white); letter-spacing:0.06em; }

  /* FORM */
  #form-screen { background:var(--bg2); }
  .form-body { padding:28px 22px 24px; max-width:680px; margin:0 auto; width:100%; }
  .form-intro { font-size:13px; line-height:1.9; color:var(--gray2); margin-bottom:24px; padding:14px 16px; background:var(--bg3); border-left:2px solid var(--border2); }
  .clause { margin-bottom:26px; }
  .clause-header { display:flex; align-items:baseline; gap:10px; margin-bottom:8px; }
  .clause-num { font-size:10px; color:var(--gray3); letter-spacing:0.2em; flex-shrink:0; }
  .clause-title { font-family:'Noto Serif TC',serif; font-size:14px; font-weight:600; color:var(--white); letter-spacing:0.06em; }
  .clause-rule { height:1px; background:var(--border); margin-bottom:10px; }
  .clause-text { font-size:12px; line-height:2; color:var(--gray2); }
  .clause-header { display:flex; align-items:center; gap:8px; }
  .clause-x { margin-left:auto; flex-shrink:0; padding:4px 10px; border:1px solid var(--border2); border-radius:14px; background:none; color:var(--gray2); font-size:10px; letter-spacing:0.08em; cursor:pointer; line-height:1.4; font-family:'Noto Sans TC',sans-serif; white-space:nowrap; }
  .clause-x:active { background:var(--bg3); }
  .clause-restore { display:none; width:100%; padding:10px; background:none; border:1px dashed var(--border); border-radius:3px; color:var(--gray3); font-family:'Noto Sans TC',sans-serif; font-size:11px; letter-spacing:0.05em; cursor:pointer; text-align:left; }
  .clause.excluded .clause-body { display:none; }
  .clause.excluded .clause-restore { display:block; }
  .clause.excluded { margin-bottom:10px; }
  .clause-list { list-style:none; padding:0; display:flex; flex-direction:column; gap:6px; }
  .clause-list li { font-size:12px; line-height:1.9; color:var(--gray2); padding-left:14px; position:relative; }
  .clause-list li::before { content:''; position:absolute; left:0; top:10px; width:5px; height:1px; background:var(--gray3); }
  .declaration-box { margin:32px 0 26px; padding:18px; border:1px solid var(--border2); background:var(--bg3); }
  .declaration-text { font-size:12px; line-height:2; color:var(--gray1); font-weight:400; letter-spacing:0.03em; }
  .name-section { margin-bottom:24px; }
  .name-row { display:flex; gap:12px; }
  .name-col { flex:1; }
  .name-label { font-size:10px; letter-spacing:0.2em; color:var(--gray2); margin-bottom:8px; display:block; }
  .name-input { width:100%; padding:12px 14px; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); font-family:'Noto Sans TC',sans-serif; font-size:16px; color:var(--white); letter-spacing:0.05em; outline:none; transition:border-color .2s; }
  .name-input::placeholder { color:var(--gray3); }
  .name-input:focus { border-color:var(--gray2); }
  .chip-row { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:9px 16px; border:1px solid var(--border2); border-radius:20px; background:var(--bg3); color:var(--gray1); font-size:13px; letter-spacing:0.05em; cursor:pointer; transition:all .15s; font-family:'Noto Sans TC',sans-serif; }
  .chip.active { background:var(--white); color:#111; border-color:var(--white); font-weight:600; }
  .chip-row-mini { gap:4px; margin-top:0; }
  .chip-row-mini .chip { padding:2px 6px; font-size:9px; border-radius:8px; line-height:1.3; letter-spacing:0; }
  .name-label-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .name-label-row .name-label { margin-bottom:0; }
  .sig-section { margin-bottom:24px; }
  .name-divider { height:1px; background:var(--border); margin:6px 0 24px; }
  .sig-trigger { width:100%; padding:26px; background:var(--bg3); border:1px dashed var(--border2); border-radius:4px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; transition:background .15s; }
  .sig-trigger:active { background:var(--bg2); }
  .sig-trigger-text { font-family:'Noto Serif TC',serif; font-size:22px; letter-spacing:0.3em; color:var(--white); padding-left:0.3em; }
  .sig-trigger-hint { font-size:10px; letter-spacing:0.12em; color:var(--gray3); }
  .sig-preview-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  #sig-preview { width:100%; height:140px; object-fit:contain; background:#fff; border:1px solid var(--border2); border-radius:3px; }
  #sign-pad-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:500; flex-direction:column; }
  #sign-pad-overlay.open { display:flex; }
  .sign-pad-head { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--border); background:var(--bg2); }
  .sign-pad-title { font-size:13px; letter-spacing:0.15em; color:var(--gray1); }
  .sign-pad-actions { display:flex; gap:8px; }
  .sign-pad-btn { padding:9px 16px; border-radius:4px; font-family:'Noto Sans TC',sans-serif; font-size:13px; letter-spacing:0.1em; cursor:pointer; border:1px solid var(--border2); }
  .sign-pad-btn.ghost { background:none; color:var(--gray2); }
  .sign-pad-btn.solid { background:var(--white); color:#111; border-color:var(--white); font-weight:600; }
  .sign-pad-canvas-wrap { flex:1; position:relative; margin:14px; background:#fff; border-radius:4px; overflow:hidden; }
  #sig-canvas { display:block; width:100%; height:100%; touch-action:none; cursor:crosshair; }
  .sig-label { font-size:10px; letter-spacing:0.2em; color:var(--gray2); margin-bottom:8px; display:block; }
  .sig-placeholder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:16px; color:#ddd; letter-spacing:0.2em; pointer-events:none; transition:opacity .2s; }
  .clear-sig-btn { font-size:11px; color:var(--gray3); background:none; border:none; letter-spacing:0.12em; cursor:pointer; padding:4px 0; font-family:'Noto Sans TC',sans-serif; }
  .save-btn { width:100%; padding:17px; background:var(--white); color:#111; border:none; border-radius:3px; font-family:'Noto Serif TC',serif; font-size:15px; letter-spacing:0.2em; cursor:pointer; transition:background .2s; margin-bottom:48px; font-weight:600; }
  .save-btn:hover,.save-btn:active { background:var(--gray1); }

  /* RECORDS */
  #records-screen { background:var(--bg); }
  .records-body { padding:22px 20px; max-width:680px; margin:0 auto; width:100%; }
  .search-box { width:100%; padding:11px 14px; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); font-family:'Noto Sans TC',sans-serif; font-size:14px; color:var(--white); letter-spacing:0.05em; outline:none; margin-bottom:16px; }
  .search-box::placeholder { color:var(--gray3); }
  .tab-bar { display:flex; gap:0; margin-bottom:22px; border-bottom:1px solid var(--border); }
  .tab-btn { flex:1; padding:11px; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:0.1em; color:var(--gray3); cursor:pointer; transition:color .2s,border-color .2s; }
  .tab-btn.active { color:var(--white); border-bottom-color:var(--white); }
  .empty-state { text-align:center; padding:60px 20px; }
  .empty-icon { font-size:28px; margin-bottom:10px; }
  .empty-text { font-size:11px; letter-spacing:0.15em; color:var(--gray3); }
  .record-list { display:flex; flex-direction:column; gap:8px; }
  .record-card { background:var(--card); border:1px solid var(--border); border-radius:3px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .record-info { flex:1; }
  .record-type-badge { display:inline-block; font-size:9px; letter-spacing:0.2em; color:var(--gray2); border:1px solid var(--border2); padding:2px 6px; margin-bottom:5px; }
  .record-name { font-family:'Noto Serif TC',serif; font-size:14px; color:var(--white); letter-spacing:0.05em; margin-bottom:3px; }
  .record-meta { font-size:10px; color:var(--gray3); letter-spacing:0.1em; }
  .record-actions { display:flex; gap:6px; }
  .view-btn,.del-btn { width:30px; height:30px; border-radius:3px; border:1px solid var(--border2); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--bg2); width:100%; max-width:680px; max-height:90vh; overflow-y:auto; border-radius:6px 6px 0 0; padding:26px 22px 40px; border-top:1px solid var(--border); }
  .modal-title { font-family:'Noto Serif TC',serif; font-size:17px; color:var(--white); margin-bottom:4px; letter-spacing:0.06em; }
  .modal-meta { font-size:11px; color:var(--gray3); letter-spacing:0.12em; margin-bottom:18px; }
  .modal-sig-label { font-size:10px; color:var(--gray2); letter-spacing:0.2em; margin-bottom:8px; }
  .modal-sig-img { width:100%; border:1px solid var(--border2); border-radius:3px; background:#fff; }
  .modal-close { display:block; width:100%; margin-top:10px; padding:13px; background:none; border:1px solid var(--border); border-radius:3px; font-family:'Noto Sans TC',sans-serif; font-size:12px; color:var(--gray3); letter-spacing:0.15em; cursor:pointer; }
  .download-btn { display:block; width:100%; margin-top:10px; padding:13px; background:var(--white); border:none; border-radius:3px; font-family:'Noto Sans TC',sans-serif; font-size:12px; color:#111; letter-spacing:0.15em; cursor:pointer; font-weight:600; }

  /* EDIT MODE */
  .edit-hint { font-size:11px; color:var(--gray2); background:var(--bg3); border:1px dashed var(--border2); padding:10px 12px; border-radius:3px; margin-bottom:18px; letter-spacing:0.05em; line-height:1.7; }
  .edit-field { margin-bottom:16px; }
  .edit-field label { font-size:10px; letter-spacing:0.2em; color:var(--gray2); display:block; margin-bottom:6px; }
  .edit-input,.edit-textarea { width:100%; padding:10px 12px; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); font-family:'Noto Sans TC',sans-serif; font-size:13px; color:var(--white); outline:none; line-height:1.7; }
  .edit-textarea { resize:vertical; min-height:60px; }
  .edit-clause { border:1px solid var(--border); border-radius:4px; padding:14px; margin-bottom:12px; background:var(--bg2); }
  .edit-clause-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .edit-clause-num { font-size:10px; color:var(--gray2); letter-spacing:0.15em; }
  .del-clause-btn { font-size:10px; color:#c66; background:none; border:1px solid #644; border-radius:3px; padding:3px 8px; cursor:pointer; letter-spacing:0.1em; }
  .add-clause-btn { width:100%; padding:12px; background:var(--bg3); border:1px dashed var(--border2); border-radius:3px; color:var(--gray1); font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:0.12em; cursor:pointer; margin-bottom:18px; }
  .designer-edit-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .designer-edit-row input { flex:1; padding:9px 12px; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); color:var(--white); font-size:13px; font-family:'Noto Sans TC',sans-serif; outline:none; }
  .dz-btn { width:34px; height:34px; flex-shrink:0; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); color:var(--gray1); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .dz-btn:active { background:var(--bg); }
  .dz-del { color:#c66; border-color:#644; }
  .edit-save-btn { width:100%; padding:15px; background:var(--white); color:#111; border:none; border-radius:3px; font-family:'Noto Serif TC',serif; font-size:14px; letter-spacing:0.2em; cursor:pointer; font-weight:600; margin-bottom:12px; }
  .edit-reset-btn { width:100%; padding:12px; background:none; border:1px solid var(--border2); border-radius:3px; color:var(--gray2); font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:0.12em; cursor:pointer; margin-bottom:18px; }
  .pin-setting-box { border:1px solid var(--border2); border-radius:4px; padding:16px; margin:22px 0 18px; background:var(--bg2); }
  .pin-setting-title { font-size:14px; letter-spacing:0.1em; color:var(--white); margin-bottom:6px; font-weight:500; }
  .pin-setting-desc { font-size:11px; line-height:1.7; color:var(--gray2); letter-spacing:0.03em; margin-bottom:12px; }
  #pin-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:400; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; }
  #pin-overlay.open { display:flex; }
  .pin-title { font-family:'Noto Serif TC',serif; font-size:18px; letter-spacing:0.15em; color:var(--white); margin-bottom:6px; }
  .pin-sub { font-size:11px; letter-spacing:0.12em; color:var(--gray2); margin-bottom:30px; }
  .pin-dots { display:flex; gap:16px; margin-bottom:36px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:1px solid var(--border2); transition:all .15s; }
  .pin-dot.filled { background:var(--white); border-color:var(--white); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,72px); gap:16px; }
  .pin-key { width:72px; height:72px; border-radius:50%; border:1px solid var(--border); background:var(--bg2); color:var(--white); font-size:24px; font-family:'Noto Serif TC',serif; cursor:pointer; transition:background .1s; }
  .pin-key:active { background:var(--bg3); }
  .pin-key.fn { font-size:13px; letter-spacing:0.1em; border:none; background:none; color:var(--gray2); font-family:'Noto Sans TC',sans-serif; }
  .pin-err { color:#c66; font-size:11px; letter-spacing:0.12em; height:16px; margin-top:14px; }
  .pin-field { margin-bottom:16px; }
  .pin-field label { font-size:10px; letter-spacing:0.2em; color:var(--gray2); display:block; margin-bottom:6px; }
  .pin-field input { width:100%; padding:11px 12px; border:1px solid var(--border2); border-radius:3px; background:var(--bg3); color:var(--white); font-size:15px; letter-spacing:0.3em; outline:none; text-align:center; }

  .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--white); color:#111; font-size:12px; letter-spacing:0.15em; padding:11px 22px; border-radius:3px; opacity:0; transition:opacity .3s,transform .3s; z-index:200; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #image-preview { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300; flex-direction:column; align-items:center; overflow-y:auto; padding:20px; }
  #image-preview.open { display:flex; }
  .preview-hint { color:var(--gray1); font-size:13px; letter-spacing:0.08em; text-align:center; margin-bottom:14px; line-height:1.7; }
  #preview-img { max-width:100%; height:auto; border-radius:4px; background:#fff; }
  .preview-btns { display:flex; gap:10px; margin-top:16px; width:100%; max-width:400px; }
  #preview-download { flex:1; text-align:center; padding:13px; background:var(--white); color:#111; border-radius:3px; font-size:13px; letter-spacing:0.12em; text-decoration:none; font-weight:600; }
  #preview-close-btn { flex:1; padding:13px; background:none; border:1px solid var(--border2); border-radius:3px; color:var(--gray1); font-size:13px; letter-spacing:0.12em; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
</style>
</head>

let savedSigData = null;
function openSignPad() {

function closeSignPad() {

function initSig() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');
  document.getElementById('sig-placeholder').style.opacity = '1';
  const wrap = sigCanvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  sigCanvas.width = wrap.offsetWidth * dpr;
  sigCanvas.height = wrap.offsetHeight * dpr;
  sigCtx.scale(dpr, dpr);
  sigCtx.strokeStyle = '#111111'; sigCtx.lineWidth = 2.5; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
  drawing = false;
  function pos(e){ const r=sigCanvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:s.clientX-r.left,y:s.clientY-r.top}; }
  sigCanvas.onmousedown=sigCanvas.ontouchstart=e=>{ e.preventDefault(); drawing=true; const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); document.getElementById('sig-placeholder').style.opacity='0'; };
  sigCanvas.onmousemove=sigCanvas.ontouchmove=e=>{ e.preventDefault(); if(!drawing)return; const p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); };
  sigCanvas.onmouseup=sigCanvas.ontouchend=()=>{ drawing=false; };
}
function clearPad(){ if(sigCtx){ sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); } document.getElementById('sig-placeholder').style.opacity='1'; }
function isCanvasBlank(){
  const blank = document.createElement('canvas'); blank.width=sigCanvas.width; blank.height=sigCanvas.height;
  return sigCanvas.toDataURL() === blank.toDataURL();
}
function confirmSignPad(){
  if(!sigCanvas || isCanvasBlank()){ showToast('請先簽名'); return; }
  savedSigData = sigCanvas.toDataURL('image/png');
  hasSig = true;
  document.getElementById('sig-preview').src = savedSigData;
  document.getElementById('sig-preview-wrap').style.display = 'flex';
  document.getElementById('sig-trigger').style.display = 'none';
  closeSignPad();
}
function clearSignature(){
  savedSigData = null; hasSig = false;
  document.getElementById('sig-preview-wrap').style.display = 'none';
  document.getElementById('sig-trigger').style.display = 'flex';
}

/* ---- DOWNLOAD FULL CONSENT (clauses + date + signature) ---- */
function downloadRecord() {
  if(!currentViewRecord) return;
  const r = currentViewRecord;
  const tl = {extension:'接髮前同意書',bleach:'漂髮前同意書',perm:'燙髮前同意書'};
  // use the exact clauses this customer agreed to (snapshot), fallback to current template
  const form = r.snapshot ? r.snapshot : FORMS[r.type];
  const W = 800, PAD = 50;
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  const ratio = 2; // hi-res
  // first measure height with a temp pass
  c.width = W*ratio; c.height = 10; // temp
  ctx.scale(ratio,ratio);

  // helper to wrap text, returns lines
  function wrap(text, font, maxW) {
    ctx.font = font;
    const out = [];
    text.split('\n').forEach(para=>{
      let line='';
      for(const ch of para){
        if(ctx.measureText(line+ch).width > maxW){ out.push(line); line=ch; }
        else line+=ch;
      }
      out.push(line);
    });
    return out;
  }

  // pre-compute layout
  const blocks = [];
  let y = PAD;
  blocks.push({type:'salon', y}); y += 26;
  blocks.push({type:'title', y}); y += 40;
  blocks.push({type:'rule', y}); y += 26;
  // intro
  const introLines = wrap(form.intro, '14px sans-serif', W-PAD*2);
  blocks.push({type:'intro', y, lines:introLines}); y += introLines.length*24 + 18;
  // clauses
  form.clauses.forEach(cl=>{
    const head = `${cl.num}　${cl.title}`;
    const bodyLines = wrap(cl.text, '13px sans-serif', W-PAD*2);
    blocks.push({type:'clause', y, head, lines:bodyLines});
    y += 24 + bodyLines.length*22 + 16;
  });
  // declaration
  const decLines = wrap(form.declaration, 'bold 13px sans-serif', W-PAD*2);
  y += 6;
  blocks.push({type:'dec', y, lines:decLines}); y += decLines.length*23 + 26;
  // meta + signature
  blocks.push({type:'meta', y}); y += 24;
  if(r.designer){ blocks.push({type:'designer', y}); y += 24; }
  y += 10;
  blocks.push({type:'siglabel', y}); y += 22;
  const sigH = 150, sigW = 360;
  blocks.push({type:'sig', y, h:sigH, w:sigW}); y += sigH + PAD;

  const totalH = y;
  // real render
  c.width = W*ratio; c.height = totalH*ratio;
  ctx.scale(ratio,ratio);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,totalH);
  ctx.fillStyle = '#111111'; ctx.fillRect(0,0,W,4);

  const sigImg = new Image();
  sigImg.onload = () => {
    blocks.forEach(b=>{
      if(b.type==='salon'){ ctx.fillStyle='#888'; ctx.font='12px sans-serif'; ctx.fillText(SALON_NAME.toUpperCase(), PAD, b.y); }
      if(b.type==='title'){ ctx.fillStyle='#111'; ctx.font='bold 24px sans-serif'; ctx.fillText(tl[r.type], PAD, b.y); }
      if(b.type==='rule'){ ctx.strokeStyle='#ddd'; ctx.beginPath(); ctx.moveTo(PAD,b.y); ctx.lineTo(W-PAD,b.y); ctx.stroke(); }
      if(b.type==='intro'){ ctx.fillStyle='#555'; ctx.font='14px sans-serif'; b.lines.forEach((l,i)=>ctx.fillText(l, PAD, b.y+i*24)); }
      if(b.type==='clause'){ ctx.fillStyle='#111'; ctx.font='bold 15px sans-serif'; ctx.fillText(b.head, PAD, b.y); ctx.fillStyle='#444'; ctx.font='13px sans-serif'; b.lines.forEach((l,i)=>ctx.fillText(l, PAD, b.y+24+i*22)); }
      if(b.type==='dec'){ ctx.fillStyle='#f5f5f5'; ctx.fillRect(PAD-12, b.y-20, W-PAD*2+24, b.lines.length*23+24); ctx.fillStyle='#111'; ctx.font='bold 13px sans-serif'; b.lines.forEach((l,i)=>ctx.fillText(l, PAD, b.y+i*23)); }
      if(b.type==='meta'){ ctx.fillStyle='#111'; ctx.font='14px sans-serif'; ctx.fillText('簽署日期：'+formatDateDisplay(r.date), PAD, b.y); }
      if(b.type==='designer'){ ctx.fillStyle='#555'; ctx.font='13px sans-serif'; ctx.fillText('施作設計師：'+r.designer, PAD, b.y); }
      if(b.type==='siglabel'){ ctx.fillStyle='#888'; ctx.font='12px sans-serif'; ctx.fillText('顧客簽名 ＿＿＿＿＿＿＿', PAD, b.y); }
      if(b.type==='sig'){ ctx.strokeStyle='#ccc'; ctx.strokeRect(PAD, b.y, b.w, b.h); ctx.drawImage(sigImg, PAD, b.y, b.w, b.h); ctx.fillStyle='#111'; ctx.font='13px sans-serif'; ctx.fillText(r.name, PAD+b.w+24, b.y+b.h/2); }
    });
    const fname = `${r.date}_${r.name}_${tl[r.type]}.png`;
    c.toBlob(async (blob)=>{
      if(!blob){ showToast('產生圖片失敗，請重試'); return; }
      const file = new File([blob], fname, {type:'image/png'});
      // 1) iOS/Android share sheet -> "儲存影像" saves to Photos
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try { await navigator.share({files:[file]}); showToast('已開啟分享，可選「儲存影像」'); return; }
        catch(err){ if(err && err.name==='AbortError'){ return; } }
      }
      // 2) fallback: open fullscreen image to long-press save
      const url = URL.createObjectURL(blob);
      showImagePreview(url, fname);
    }, 'image/png');
  };
  sigImg.src = r.sig;
}

function showImagePreview(url, fname) {
  const ov = document.getElementById('image-preview');
  document.getElementById('preview-img').src = url;
  const dl = document.getElementById('preview-download');
  dl.href = url; dl.download = fname;
  ov.classList.add('open');
}

function requestPin(purpose){
  if(!getPin()){
    if(purpose==='edit'){ setEditMode(true); showToast('已進入編輯模式'); }
    return;
  }
  pinPurpose = purpose; pinBuffer = '';
  document.getElementById('pin-title').textContent = purpose==='edit' ? '輸入密碼以編輯' : '請輸入密碼';
  document.getElementById('pin-err').textContent = '';
  renderPinDots();
  document.getElementById('pin-overlay').classList.add('open');
}
function pinPress(d){
  if(pinBuffer.length>=4) return;
  pinBuffer += d; renderPinDots();
  if(pinBuffer.length===4) setTimeout(pinCheck, 120);
}
function pinBack(){ pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); }
function pinClear(){ pinBuffer=''; renderPinDots(); }
function pinCheck(){
  if(pinBuffer === getPin()){
    document.getElementById('pin-overlay').classList.remove('open');
    if(pinPurpose==='edit'){ setEditMode(true); showToast('已進入編輯模式'); }
    pinBuffer=''; pinPurpose=null;
  } else {
    document.getElementById('pin-err').textContent = '密碼錯誤，請重試';
    pinBuffer=''; renderPinDots();
  }
}

/* ---- GUIDED TOUR (使用說明) ---- */
const TOUR_STEPS = [
  { el:'tour-hint', title:'編輯模式說明', text:'這裡是編輯模式，可以修改同意書的所有內容。修改只會記在這台裝置，不會影響已經簽好的舊紀錄。跟著說明走一遍吧！' },
  { el:'tour-salon', title:'店名', text:'這裡改首頁顯示的店名（HELLOTRYIT 那一行）。' },
  { el:'tour-intro', title:'開頭說明', text:'同意書最上方的引言文字，客人簽名前會先看到這段。' },
  { el:'tour-designers', title:'設計師名單', text:'管理可選的設計師。可新增、刪除，或用 ↑↓ 調整順序。簽名畫面就會出現這些設計師的小標籤。' },
  { el:'tour-target-clauses', title:'條款內容', text:'每一條的編號、標題、內容都能改。右邊有 ↑↓ 調順序、「刪除」會永久移除這條（影響範本）。' },
  { el:'tour-addclause', title:'新增條款', text:'按這裡會在最後面加一條空白條款，再填入編號、標題、內容即可。' },
  { el:'tour-declaration', title:'顧客聲明', text:'同意書最下方的聲明文字，通常是「本人已詳閱並同意…」這段。' },
  { el:'tour-pin', title:'開啟密碼', text:'設定 4 位數字密碼，之後要進入編輯模式就需要輸入。留空＝不設密碼。預設是 1234。' },
  { el:'tour-save', title:'儲存編輯', text:'改完一定要按這顆「儲存編輯」才會存起來，並自動離開編輯模式。' },
  { el:'tour-reset', title:'還原為預設內容', text:'如果改壞了，按這顆可以把這份同意書還原成原始預設版本。' },
];
let tourIdx = 0;
function startTour(){ tourIdx = 0; document.getElementById('tour-mask').classList.add('open'); showTourStep(); }
function showTourStep(){
  const step = TOUR_STEPS[tourIdx];
  let el = document.getElementById(step.el) || document.querySelector('.'+step.el);
  if(!el){ tourNext(); return; }
  el.scrollIntoView({behavior:'smooth', block:'center'});
  setTimeout(()=>{
    const r = el.getBoundingClientRect();
    const spot = document.getElementById('tour-spot');
    const pad = 6;
    spot.style.left = (r.left-pad)+'px'; spot.style.top = (r.top-pad)+'px';
    spot.style.width = (r.width+pad*2)+'px'; spot.style.height = (r.height+pad*2)+'px';
    document.getElementById('tour-pop-title').textContent = step.title;
    document.getElementById('tour-pop-text').textContent = step.text;
    document.getElementById('tour-step').textContent = `${tourIdx+1} / ${TOUR_STEPS.length}`;
    document.getElementById('tour-next').textContent = (tourIdx===TOUR_STEPS.length-1)?'完成':'下一步';
    const pop = document.getElementById('tour-pop');
    const below = r.bottom + 14;
    if(below + 160 < window.innerHeight){ pop.style.top = below+'px'; }
    else { pop.style.top = Math.max(14, r.top - 170)+'px'; }
    let left = Math.min(Math.max(12, r.left), window.innerWidth - 312);
    pop.style.left = left+'px';
  }, 320);
}
function tourNext(){
  tourIdx++;
  if(tourIdx >= TOUR_STEPS.length){ document.getElementById('tour-mask').classList.remove('open'); return; }
  showTourStep();
}

loadConfig();
// 預設密碼 1234（首次使用自動設定，之後可在編輯模式修改）
if(localStorage.getItem('salon_pin')===null){ localStorage.setItem('salon_pin','1234'); }
// 進入 App 不需密碼；僅進入編輯模式時才會要求密碼
